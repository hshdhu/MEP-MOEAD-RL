# Environment Settings
environment:
  width: 400
  height: 400
  num_sensors: 200
  num_obstacles: 8
  coverage_ratio: 0.2

# Path Representation
path:
  dx: 5
  length_max: 2000.0

# Exposure Calculation
exposure:
  step: 1.0

# Repair Parameters
repair:
  attempts: 100

# Sensor & Obstacle Settings
sensor:
  radius_min: 5
  radius_max: 50
  power: 1.0

obstacle:
  min_distance: 5
  min_area: 50
  radius_min: 15
  radius_max: 75
  vertices_min: 4
  vertices_max: 8

algorithm:

  ppo:
    n_generations: 3000      # Số tập (episodes) training - Đặt làm chuẩn
    n_steps: 2048            # Số bước chạy trước khi cập nhật
    batch_size: 64           # Kích thước batch để training
    n_epochs: 12             # Số lần training lại trên cùng dữ liệu
    lr: 0.0001               # Learning rate
    gamma: 0.99              # Hệ số chiết khấu (Discount factor)
    gae_lambda: 0.95         # Hệ số GAE để tính advantage
    clip_range: 0.3          # Tham số chặn của PPO
    ent_coef: 0.04           # Hệ số entropy để khuyến khích khám phá
    action_scale: 8.0        # Giới hạn dịch chuyển Y
    pop_size: 1              # Chạy đơn lẻ

  td3:
    n_generations: 2000      # Đồng bộ bằng đúng n_generations của PPO
    batch_size: 128          # Cỡ batch lấy từ Replay Buffer (Off-policy thường dùng 128-256)
    hidden_size: 256         # Số node ẩn trong mạng (Bằng với kiến trúc PPO)
    lr: 0.0003               # Learning rate (Thường TD3/SAC xài 3e-4, PPO xài 1e-4)
    gamma: 0.99              # Hệ số chiết khấu
    tau: 0.005               # Hệ số cập nhật mềm cho Target Net

    action_scale: 8.0        # Đồng bộ giới hạn dịch chuyển với PPO
    exploration_noise: 0.1   # SỬA QUAN TRỌNG: Nhiễu 10% trên dải [-1, 1] của mạng Actor
    policy_noise: 0.2        # Nhiễu thêm vào Target Policy (Chống overestimation)
    noise_clip: 0.5          # Giới hạn cắt của policy_noise
    policy_freq: 2           # Tần suất cập nhật mạng Actor (Đặc trưng TD3)
    max_replay_buffer: 100000

  sac:
    n_generations: 2000      # Đồng bộ bằng đúng PPO và TD3
    batch_size: 128          # Giống TD3
    hidden_size: 256         # Bằng PPO/TD3
    lr: 0.0003               # Bằng TD3
    gamma: 0.99              # Hệ số chiết khấu
    tau: 0.005               # Cập nhật mềm

    action_scale: 8.0        # Đồng bộ giới hạn dịch chuyển
    max_replay_buffer: 100000

  moead:
    pop_size: 100
    n_generations: 1000      # Nâng lên 1000 cho công bằng với RL (Tùy bạn chọn)
    neighborhood_size: 15
    crossover_prob: 0.9
    mutation_prob: 0.4
    eta_c: 10
    eta_m: 10